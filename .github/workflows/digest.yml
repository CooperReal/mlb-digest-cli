name: Daily Digest

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      catchup:
        description: "Include roster, season overview, playoff picture"
        required: false
        type: boolean
        default: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    environment: digest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4

      - run: uv sync

      - name: Send digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: |
          if [ "${{ inputs.catchup }}" = "true" ]; then
            uv run mlb-digest --catchup
          else
            uv run mlb-digest
          fi
